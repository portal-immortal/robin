<!DOCTYPE html>
<html lang="id">
<head>
  <!-- Page metadata and external resources -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pondok Pesantren Roudhotuttholibin - Coming Soon</title>
  <meta name="description" content="Website Pondok Pesantren Roudhotuttholibin sedang dipersiapkan. Halaman landing modern, elegan, dan responsif." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Landing page wrapper -->
  <div class="landing-page">
    <!-- Ambient floating shapes -->
    <div class="shape-circle" style="width: 180px; height: 180px; top: 6%; left: 6%;"></div>
    <div class="shape-dot" style="top: 20%; left: 24%;"></div>
    <div class="shape-square" style="top: 8%; right: 10%;"></div>
    <div class="shape-lines" style="bottom: 20%; left: 8%;"></div>
    <div class="shape-dot" style="bottom: 14%; right: 18%; width: 12px; height: 12px;"></div>

    <!-- Main content card -->
    <div class="card-surface">
      <div class="hero-content">
        <!-- Animated logo section -->
        <div class="logo-hero" aria-hidden="true">
          <div class="ring"></div>
          <div class="logo-center">
            <img src="logo Robin.jpg" alt="Logo Pondok Pesantren Roudhotuttholibin" />
          </div>
        </div>

        <!-- Main heading and summary -->
        <div class="title-group">
          <p class="text-uppercase fw-semibold text-success mb-2">Coming Soon</p>
          <h1>Website Sedang Dipersiapkan</h1>
          <p>Assalamu'alaikum warahmatullahi wabarakatuh. Kami sedang menyiapkan portal resmi Pondok Pesantren Roudhotuttholibin dengan tampilan elegan dan ramah untuk keluarga santri.</p>
        </div>

        <!-- Progress and loading animation -->
        <div class="loading-panel">
          <div class="progress-track">
            <div class="progress-bar"></div>
          </div>
          <div class="loading-status">
            <span class="status-text"><i class="fas fa-mosque text-success me-2"></i>Memuat konten dan detail utama...</span>
            <div class="loading-dots" aria-label="Loading">
              <span class="loading-dot"></span>
              <span class="loading-dot"></span>
              <span class="loading-dot"></span>
            </div>
          </div>
        </div>

        <!-- Mosque silhouette at the bottom -->
        <div class="mosque-row">
          <svg class="mosque-shape" viewBox="0 0 520 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M42 106H478V118H42V106Z" fill="#D4AF37" opacity="0.14" />
            <path d="M90 104V74H108V104H90Z" fill="#0F7A3D" />
            <path d="M146 104V60H166V104H146Z" fill="#0F7A3D" />

            <path d="M346 104V84H366V104H346Z" fill="#0F7A3D" />
            <path d="M402 104V66H422V104H402Z" fill="#0F7A3D" />
            <path d="M16 74C16 55.9086 30.9086 41 49 41H81V74H16Z" fill="#D4AF37" opacity="0.1" />
            <path d="M428 74C428 55.9086 442.909 41 461 41H493V74H428Z" fill="#D4AF37" opacity="0.1" />
            <path d="M240 20C240 11.1634 247.163 4 256 4C264.837 4 272 11.1634 272 20V56H240V20Z" fill="#0F7A3D" />
            <path d="M200 64L216 46L232 64H224V88H208V64H200Z" fill="#0F7A3D" />
          </svg>
        </div>
      </div>
    </div>

    <!-- Page footer -->
    <footer class="footer">© 2026 Pondok Pesantren Roudhotuttholibin</footer>
  </div>

  <!-- Bootstrap and page script -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="scripts.js"></script>
</body>
</html>
