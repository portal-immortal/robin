<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading...</title>
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      width: 100%;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #ffffff;
      overflow: hidden;
    }
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 1rem;
      width: 100%;
      max-width: 900px;
      box-sizing: border-box;
    }
    .loader img {
      display: block;
      max-width: 100%;
      height: auto;
    }
    .spinner {
      width: min(140px, 25vw);
      max-height: 140px;
    }
    .main-image {
      width: auto;
      max-width: 90vw;
      max-height: 65vh;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div class="loader">
    <img class="spinner" src="loading.gif" alt="Animated loading spinner" />
    <img class="main-image" src="loading under construction.png" alt="Loading under construction" />
  </div>
</body>
</html>
